<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Online Shop BFF</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .dark { background-color: #1a202c; color: white; }
        .dark nav, .dark .bg-white { background-color: #2d3748; color: white; }
        .dark .text-gray-800 { color: #f7fafc; }
    </style>
</head>
<body class="bg-gray-100 font-sans transition-colors duration-300">

    <nav class="bg-white shadow-lg p-4 sticky top-0 z-50">
        <div class="container mx-auto flex justify-between items-center">
            <h1 class="text-2xl font-bold text-blue-600">ONLINE SHOP BFF</h1>
            <div class="flex items-center gap-2">
                <button onclick="showCart()" id="cart-btn" class="bg-blue-600 text-white px-4 py-2 rounded-lg hover:bg-blue-700 transition font-semibold">
                    Savatcha (0)
                </button>
                <button onclick="toggleDarkMode()" id="dark-mode-btn" class="bg-gray-200 text-gray-800 px-3 py-2 rounded-lg hover:bg-gray-300 transition-all">
                    🌙
                </button>
                <button onclick="showWishlist()" class="bg-red-100 text-red-600 px-3 py-2 rounded-lg hover:bg-red-200 transition-all">
                    ❤️ (<span id="wishlist-count">0</span>)
                </button>
            </div>
        </div>
    </nav>

    <header class="bg-blue-500 text-white py-16 text-center">
        <h2 class="text-4xl font-extrabold mb-2">Sifatli mahsulotlar markazi</h2>
        <p class="text-lg text-blue-100">Xitoy, Koreya va Yaponiyadan sara tovarlar</p>
    </header>

    <section class="container mx-auto px-4 mt-8">
        <div class="flex flex-col md:flex-row gap-4 justify-between items-center bg-white p-4 rounded-2xl shadow-sm">
            <div class="relative w-full md:w-1/3">
                <input type="text" id="searchInput" onkeyup="filterProducts()" placeholder="Mahsulot qidirish..." 
                    class="w-full pl-10 pr-4 py-2 border rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-500 text-gray-800">
                <span class="absolute left-3 top-2.5">🔍</span>
            </div>
            <div class="flex gap-2 overflow-x-auto pb-2 md:pb-0 w-full md:w-auto">
                <button onclick="filterCategory('all')" class="bg-blue-100 text-blue-600 px-4 py-2 rounded-lg font-medium">Hammasi</button>
                <button onclick="filterCategory('Elektronika')" class="bg-gray-100 text-gray-600 px-4 py-2 rounded-lg font-medium">Elektronika</button>
                <button onclick="filterCategory('Kiyim')" class="bg-gray-100 text-gray-600 px-4 py-2 rounded-lg font-medium">Kiyim</button>
                <button onclick="filterCategory('Aksessuar')" class="bg-gray-100 text-gray-600 px-4 py-2 rounded-lg font-medium">Aksessuar</button>
            </div>
        </div>
    </section>

    <main class="container mx-auto py-10 px-4">
        <h3 class="text-2xl font-bold mb-8 text-gray-800 border-b-2 border-blue-500 inline-block">Bizning mahsulotlar</h3>
        <div id="product-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-8">
            </div>
    </main>

    <footer class="bg-gray-800 text-white py-6 text-center mt-12 text-sm">
        <p>&copy; 2026 Online Shop BFF. Barcha huquqlar himoyalangan.</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
